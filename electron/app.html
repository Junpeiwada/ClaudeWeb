<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentNest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #C96442;
      --accent-hover: #b5573a;
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-hover: #1a2745;
      --border: #2a2a4a;
      --text: #e0e0e0;
      --text-secondary: #888;
      --green: #4caf50;
      --red: #e74c3c;
      --radius: 10px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* タイトルバー（ドラッグ領域） */
    .titlebar {
      -webkit-app-region: drag;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    /* メインコンテンツ */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 28px 24px;
      gap: 20px;
    }

    /* === 上部2カラム === */
    .top-row {
      display: flex;
      gap: 20px;
    }

    /* 左カラム: ロゴ + 更新 */
    .left-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 140px;
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #C96442 0%, #D4845E 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }
    .app-name {
      font-size: 16px;
      font-weight: 700;
    }
    .version {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .update-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-top: 4px;
    }
    .update-status .check-mark { color: var(--green); }
    .update-status .error-text { color: var(--red); }
    .btn-update {
      padding: 5px 14px;
      font-size: 11px;
      border-radius: 6px;
    }
    .progress-bar {
      width: 100px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    /* 右カラム: サーバー状態 + 制御 */
    .right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.running { background: var(--green); box-shadow: 0 0 8px rgba(76, 175, 80, 0.4); }
    .status-dot.stopped { background: #666; }
    .buttons {
      display: flex;
      gap: 10px;
    }
    .error-msg {
      color: var(--red);
      font-size: 12px;
      text-align: center;
    }

    /* ボタン共通 */
    button {
      -webkit-app-region: no-drag;
      padding: 9px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(231, 76, 60, 0.1); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-secondary:hover { background: var(--surface-hover); }

    /* === 下段（全幅） === */

    /* リンク */
    .link-section {
      width: 100%;
      text-align: center;
    }
    .web-link {
      -webkit-app-region: no-drag;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: var(--radius);
      transition: background 0.15s ease;
      cursor: pointer;
    }
    .web-link:hover { background: rgba(201, 100, 66, 0.1); }

    /* 区切り線 */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    /* 設定情報 */
    .info-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 0 4px;
    }
    .info-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .info-value {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .settings-btn {
      width: 100%;
      justify-content: center;
      margin-top: 4px;
    }

    /* 設定フォーム */
    .settings-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .settings-form.hidden { display: none; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    input[type="text"], input[type="number"] {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    input:focus { border-color: var(--accent); }
    input[type="number"] { width: 100px; flex: none; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .checkbox-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .form-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn-save { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">AgentNest</span>
  </div>

  <div class="content">
    <!-- 上部2カラム -->
    <div class="top-row">
      <!-- 左カラム: ロゴ + バージョン + 更新 -->
      <div class="left-col">
        <div class="logo">C</div>
        <div class="app-name">AgentNest</div>
        <span class="version" id="appVersion"></span>
        <div class="update-status" id="updateStatus"></div>
      </div>

      <!-- 右カラム: サーバー状態 + 制御ボタン -->
      <div class="right-col">
        <div class="status-badge">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">確認中...</span>
        </div>
        <div class="buttons" id="controlButtons"></div>
        <div class="error-msg" id="statusError"></div>
      </div>
    </div>

    <!-- Web UIリンク -->
    <div class="link-section" id="linkSection" style="display:none">
      <a class="web-link" id="webLink" href="#">
        ↗ ブラウザで開く
      </a>
    </div>

    <div class="divider"></div>

    <!-- 設定情報（通常表示） -->
    <div class="info-section" id="infoSection">
      <div class="info-row">
        <span class="info-icon">📁</span>
        <span class="info-value" id="infoDir">-</span>
      </div>
      <div class="info-row">
        <span class="info-icon">🔌</span>
        <span class="info-value" id="infoPort">-</span>
      </div>
      <div class="info-row">
        <span class="info-icon">⚡</span>
        <span class="info-value" id="infoAuto">-</span>
      </div>
      <button class="btn-secondary settings-btn" id="showSettingsBtn">⚙ 設定を変更</button>
    </div>

    <!-- 設定フォーム（編集時） -->
    <div class="settings-form hidden" id="settingsForm">
      <div class="form-group">
        <label>プロジェクトフォルダ</label>
        <div class="input-row">
          <input type="text" id="inputDir" readonly placeholder="フォルダを選択...">
          <button class="btn-secondary" id="selectDirBtn">選択</button>
        </div>
      </div>
      <div class="form-group">
        <label>ポート番号</label>
        <input type="number" id="inputPort" min="1024" max="65535" value="3000">
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="inputAutoStart" checked>
        アプリ起動時にサーバーを自動開始
      </label>
      <div class="error-msg" id="formError"></div>
      <div class="form-buttons">
        <button class="btn-secondary" id="cancelSettingsBtn">キャンセル</button>
        <button class="btn-save" id="saveSettingsBtn">保存して再起動</button>
      </div>
    </div>
  </div>

  <script>
    const api = window.electronAPI;
    let currentConfig = { baseProjectDir: "", port: 3000, autoStartServer: true };
    let isRunning = false;
    let isBusy = false;

    // --- DOM ---
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const controlButtons = document.getElementById("controlButtons");
    const linkSection = document.getElementById("linkSection");
    const webLink = document.getElementById("webLink");
    const infoDir = document.getElementById("infoDir");
    const infoPort = document.getElementById("infoPort");
    const infoAuto = document.getElementById("infoAuto");
    const infoSection = document.getElementById("infoSection");
    const settingsForm = document.getElementById("settingsForm");
    const showSettingsBtn = document.getElementById("showSettingsBtn");
    const cancelSettingsBtn = document.getElementById("cancelSettingsBtn");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    const selectDirBtn = document.getElementById("selectDirBtn");
    const inputDir = document.getElementById("inputDir");
    const inputPort = document.getElementById("inputPort");
    const inputAutoStart = document.getElementById("inputAutoStart");
    const formError = document.getElementById("formError");
    const statusError = document.getElementById("statusError");

    // --- Render ---
    function render() {
      // Status
      statusDot.className = "status-dot " + (isRunning ? "running" : "stopped");
      statusText.textContent = isRunning
        ? `起動中  Port: ${currentConfig.port}`
        : "停止中";

      // 起動成功したらエラーをクリア
      if (isRunning) {
        statusError.textContent = "";
      }

      // Buttons
      if (isRunning) {
        controlButtons.innerHTML = "";
        const stopBtn = makeBtn("■ 停止", "btn-danger", handleStop);
        const restartBtn = makeBtn("↻ 再起動", "btn-secondary", handleRestart);
        controlButtons.append(stopBtn, restartBtn);
      } else {
        controlButtons.innerHTML = "";
        const startBtn = makeBtn("▶ 開始", "btn-primary", handleStart);
        controlButtons.append(startBtn);
      }

      // Link
      if (isRunning) {
        linkSection.style.display = "";
        webLink.textContent = `↗ http://localhost:${currentConfig.port}`;
        webLink.className = "web-link";
      } else {
        linkSection.style.display = "none";
      }

      // Info
      infoDir.textContent = currentConfig.baseProjectDir || "未設定";
      infoPort.textContent = `ポート: ${currentConfig.port}`;
      infoAuto.textContent = `自動起動: ${currentConfig.autoStartServer ? "ON" : "OFF"}`;

      // Disable buttons when busy
      controlButtons.querySelectorAll("button").forEach(b => b.disabled = isBusy);
    }

    function makeBtn(label, cls, handler) {
      const btn = document.createElement("button");
      btn.className = cls;
      btn.textContent = label;
      btn.addEventListener("click", handler);
      return btn;
    }

    // --- Actions ---
    async function handleStart() {
      if (isBusy) return;
      if (!currentConfig.baseProjectDir) {
        showSettings();
        return;
      }
      isBusy = true;
      statusError.textContent = "";
      render();
      try {
        await api.startServer();
      } catch (e) {
        statusError.textContent = "起動に失敗: " + e.message;
      }
      isBusy = false;
      render();
    }

    async function handleStop() {
      if (isBusy) return;
      isBusy = true;
      statusError.textContent = "";
      render();
      try {
        await api.stopServer();
      } catch (e) {
        statusError.textContent = "停止に失敗: " + e.message;
      }
      isBusy = false;
      render();
    }

    async function handleRestart() {
      if (isBusy) return;
      isBusy = true;
      statusError.textContent = "";
      render();
      try {
        await api.stopServer();
        await api.startServer();
      } catch (e) {
        statusError.textContent = "再起動に失敗: " + e.message;
      }
      isBusy = false;
      render();
    }

    // --- Link ---
    webLink.addEventListener("click", (e) => {
      e.preventDefault();
      if (isRunning) {
        api.openInBrowser(`http://localhost:${currentConfig.port}`);
      }
    });

    // --- Settings ---
    function showSettings() {
      inputDir.value = currentConfig.baseProjectDir;
      inputPort.value = currentConfig.port;
      inputAutoStart.checked = currentConfig.autoStartServer;
      formError.textContent = "";
      infoSection.style.display = "none";
      settingsForm.classList.remove("hidden");
    }

    function hideSettings() {
      settingsForm.classList.add("hidden");
      infoSection.style.display = "";
    }

    showSettingsBtn.addEventListener("click", showSettings);
    cancelSettingsBtn.addEventListener("click", hideSettings);

    selectDirBtn.addEventListener("click", async () => {
      const dir = await api.selectDirectory();
      if (dir) inputDir.value = dir;
    });

    saveSettingsBtn.addEventListener("click", async () => {
      const dir = inputDir.value;
      const port = parseInt(inputPort.value, 10);
      if (!dir) { formError.textContent = "フォルダを選択してください"; return; }
      if (isNaN(port) || port < 1024 || port > 65535) {
        formError.textContent = "ポートは1024〜65535の範囲";
        return;
      }

      saveSettingsBtn.disabled = true;
      saveSettingsBtn.textContent = "保存中...";
      formError.textContent = "";

      try {
        const newConfig = { baseProjectDir: dir, port, autoStartServer: inputAutoStart.checked };
        await api.setConfig(newConfig);
        currentConfig = { ...currentConfig, ...newConfig };

        // サーバー再起動
        if (isRunning) {
          await api.stopServer();
        }
        await api.startServer();

        hideSettings();
      } catch (e) {
        formError.textContent = "エラー: " + e.message;
      } finally {
        saveSettingsBtn.disabled = false;
        saveSettingsBtn.textContent = "保存して再起動";
      }
      render();
    });

    // --- Update UI ---
    const appVersion = document.getElementById("appVersion");
    const updateStatusEl = document.getElementById("updateStatus");

    function renderUpdateStatus(status) {
      switch (status.state) {
        case "idle":
          updateStatusEl.innerHTML = `<button class="btn-secondary btn-update" onclick="handleCheckUpdate()">更新を確認</button>`;
          break;
        case "checking":
          updateStatusEl.innerHTML = `<div class="spinner"></div> 確認中...`;
          break;
        case "available":
          updateStatusEl.innerHTML = `v${status.version} をダウンロード中...`;
          break;
        case "downloading":
          updateStatusEl.innerHTML = `
            <div class="progress-bar"><div class="progress-bar-fill" style="width:${status.percent}%"></div></div>
            ${status.percent}%`;
          break;
        case "downloaded":
          updateStatusEl.innerHTML = `<span class="check-mark">●</span> v${status.version} 準備完了<button class="btn-primary btn-update" onclick="handleInstallUpdate()">再起動して更新</button>`;
          break;
        case "up-to-date":
          updateStatusEl.innerHTML = `<span class="check-mark">✓</span> 最新バージョンです`;
          break;
        case "error":
          updateStatusEl.innerHTML = `<span class="error-text">更新エラー</span><button class="btn-secondary btn-update" onclick="handleCheckUpdate()">再試行</button>`;
          break;
        default:
          updateStatusEl.innerHTML = `<button class="btn-secondary btn-update" onclick="handleCheckUpdate()">更新を確認</button>`;
      }
    }

    async function handleCheckUpdate() {
      renderUpdateStatus({ state: "checking" });
      await api.checkForUpdate();
    }

    async function handleInstallUpdate() {
      await api.installUpdate();
    }

    // --- Init ---
    async function init() {
      currentConfig = await api.getConfig();
      const status = await api.getServerStatus();
      isRunning = status.running;
      render();

      // バージョン表示
      const version = await api.getAppVersion();
      appVersion.textContent = `v${version}`;

      // 更新状態を取得
      const uStatus = await api.getUpdateStatus();
      renderUpdateStatus(uStatus);

      // 未設定なら設定フォームを最初から表示
      if (!currentConfig.baseProjectDir) {
        showSettings();
      }
    }

    // サーバー状態変更リスナー
    api.onServerStatusChange((status) => {
      isRunning = status.running;
      if (status.port) currentConfig.port = status.port;
      if (status.error) {
        statusError.textContent = status.error;
      }
      render();
    });

    // 更新状態変更リスナー
    api.onUpdateStatusChange((status) => {
      renderUpdateStatus(status);
    });

    init();
  </script>
</body>
</html>
